version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: ai-service-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ai_service
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - ai-network

  redis:
    image: redis:7-alpine
    container_name: ai-service-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - ai-network

  vllm:
    image: vllm/vllm-openai:latest
    container_name: ai-service-vllm
    runtime: nvidia
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
    ports:
      - "8000:8000"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    command: --model Qwen/Qwen2.5-7B-Instruct --max-model-len 4096 --gpu-memory-utilization 0.9 --port 8000
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    networks:
      - ai-network
    profiles:
      - gpu

  ai-service:
    build: .
    container_name: ai-service-app
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/ai_service?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      - SPRING_DATA_REDIS_HOST=redis
      - VLLM_API_URL=http://vllm:8000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
    ports:
      - "8080:8080"
    depends_on:
      - mysql
      - redis
    networks:
      - ai-network

  nginx:
    image: nginx:alpine
    container_name: ai-service-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx-gateway.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - ai-service
    networks:
      - ai-network
    profiles:
      - production

  prometheus:
    image: prom/prometheus:latest
    container_name: ai-service-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - ai-network
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: ai-service-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - ai-network
    profiles:
      - monitoring

networks:
  ai-network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  prometheus_data:
  grafana_data:
