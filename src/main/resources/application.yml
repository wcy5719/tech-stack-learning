server:
  port: 8080
  tomcat:
    threads:
      max: 200
      min-spare: 20
    max-connections: 10000
    accept-count: 100
    connection-timeout: 30000

spring:
  main:
    allow-bean-definition-overriding: true
    allow-circular-references: true
  application:
    name: ai-customer-service
  datasource:
    url: jdbc:mysql://localhost:3306/ai_service?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false&createDatabaseIfNotExist=true
    username: root
    password: ${DB_PASSWORD:A20060307wcy}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 4
          max-wait: 3000ms

ai.service:
  max-concurrent-requests: 100
  cache-expiration-seconds: 3600
  rate-limit:
    requests-per-minute: 5000  # 测试环境提高，生产环境建议100

vllm:
  api:
    url: http://localhost:8000
  model: /Users/WangChenYang/.lmstudio/models/lmstudio-community/Qwen3-Coder-30B-A3B-Instruct-MLX-4bit
  max-tokens: 32768
  temperature: 0.7
  cluster:
    enabled: false  # 设置为true启用多实例负载均衡
    load-balancer: round-robin  # round-robin, least-active, random
    instances:
      - name: vllm-1
        url: http://localhost:8000
        model: /Users/WangChenYang/.lmstudio/models/lmstudio-community/Qwen3-Coder-30B-A3B-Instruct-MLX-4bit
        enabled: true
        weight: 1
        max-concurrent-requests: 10
      - name: vllm-2
        url: http://localhost:8001
        model: /Users/WangChenYang/.lmstudio/models/lmstudio-community/Qwen3-Coder-30B-A3B-Instruct-MLX-4bit
        enabled: false
        weight: 1
        max-concurrent-requests: 10

jwt:
  secret: ${JWT_SECRET:mySecretKeyForJwtTokenGenerationAndValidation2024}
  expiration: 86400000

resilience4j:
  circuitbreaker:
    instances:
      aiService:
        registerHealthIndicator: true
        slidingWindowSize: 20
        minimumNumberOfCalls: 10
        permittedNumberOfCallsInHalfOpenState: 5
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 30s
        failureRateThreshold: 60
        slowCallRateThreshold: 80
        slowCallDurationThreshold: 45s
        eventConsumerBufferSize: 20
      vllmService:
        registerHealthIndicator: true
        slidingWindowSize: 20
        minimumNumberOfCalls: 10
        permittedNumberOfCallsInHalfOpenState: 5
        waitDurationInOpenState: 30s
        failureRateThreshold: 60
        slowCallRateThreshold: 80
        slowCallDurationThreshold: 45s
      redisService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
  retry:
    instances:
      aiService:
        maxAttempts: 1
        waitDuration: 0ms

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,circuitbreakers,circuitbreakerevents
      base-path: /actuator
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    com.wc.aiservice: DEBUG
    org.springframework.ai: DEBUG
    io.github.resilience4j: DEBUG
    org.redisson: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - traceId=%X{traceId:-} %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - traceId=%X{traceId:-} %msg%n"
  file:
    name: logs/aiservice.log
    max-size: 100MB
    max-history: 30
  elasticsearch:
    enabled: false  # Set to true when Elasticsearch is available
    host: localhost
    port: 9200
    index: ai-service-logs
